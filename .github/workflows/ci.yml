name: CI Pipeline HardwareTrack
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests-cobertura:
    name: Tests unitarios + Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt
      - name: Ejecutar pytest con cobertura
        run: |
          cd backend
          python -m pytest --cov=. --cov-report=term --cov-report=html:../htmlcov --cov-report=xml:coverage.xml -v
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            htmlcov/
            backend/coverage.xml

  auditoria-sca:
    name: Auditoría de seguridad (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar pip-audit
        run: pip install pip-audit
      - name: Ejecutar pip-audit
        run: |
          mkdir -p qa-artifacts
          pip-audit -r backend/requirements.txt -f json -o qa-artifacts/pip-audit-report.json
      - name: Subir reporte SCA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: qa-artifacts/pip-audit-report.json

  despliegue-staging:
    name: Despliegue continuo a Staging
    runs-on: ubuntu-latest
    needs: [tests-cobertura, auditoria-sca]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Desplegar en VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd hardwaretrack-devops-infra-qa/infra
            
            # 1. Respaldar la imagen actual si existe
            docker tag infra_backend-staging:latest infra_backend-staging:backup || true
            
            # 2. Traer el nuevo código
            git pull origin main
            
            # 3. Compilar la nueva versión (si falla la compilación, el script se detiene aquí y el contenedor viejo sigue corriendo)
            docker-compose -f docker-compose.staging.yml build backend-staging
            
            # 4. Intentar levantar la nueva versión sin apagar el resto de servicios
            docker-compose -f docker-compose.staging.yml up -d --no-deps backend-staging
            
            # 5. Loop de verificación del Healthcheck (esperar hasta 30s)
            echo "verificando contenedor..."
            SUCCESS=false
            for i in {1..10}; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' infra_backend-staging_1 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "contenedor saludable"
                SUCCESS=true
                break
              fi
              echo "esperando confirmacion... (intento $i/10, estado: $STATUS)"
              sleep 3
            done
            
            # 6. Si falló al levantar, revertir a la versión de respaldo de inmediato
            if [ "$SUCCESS" = false ]; then
              echo "error de arranque, ejecutando rollback..."
              docker tag infra_backend-staging:backup infra_backend-staging:latest
              docker-compose -f docker-compose.staging.yml up -d --no-deps backend-staging
              echo "rollback finalizado"
              exit 1
            fi


